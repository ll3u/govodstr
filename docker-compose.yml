services:
  mini-streamer:
    image: ghcr.io/ll3u/govodstr:latest
    container_name: govodstr
    ports:
      - "8085:8080"
    environment:
      - VIDEO_DIR=/videos
      - PORT=8080
      - RATE_LIMIT_KB=800
    volumes:
      - /DATA/Media:/videos:ro
      - /DATA/AppData/govodstr/cache:/app/thumbnail_cache
    restart: unless-stopped